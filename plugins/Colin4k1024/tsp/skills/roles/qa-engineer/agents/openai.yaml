interface:
  display_name: "QA Engineer（测试工程师）"
  short_description: "负责测试计划、回归验证、质量评估与放行建议，确保交付满足验收标准。"
  default_prompt: "Use $qa-engineer to take the lead on the QA Engineer（测试工程师） responsibilities for this task. Start with $frontend-ui-ux-system, $doc-architecture when those shared capabilities apply. Pull in $karpathy-guidelines, $java-unit-test, $maven-qa, $browser-smoke-testing, $pairwise-test-design, $systematic-debugging, $testcontainers-integration-testing, $langfuse-coding-trace when deeper engineering execution or verification guidance is needed."
