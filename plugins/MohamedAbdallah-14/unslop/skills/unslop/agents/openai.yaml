# OpenAI-flavored agent manifest for the unslop skill.
# Consumed by Codex CLI / Agents SDK / any OpenAI-compatible runtime that
# reads agent YAML alongside a SKILL.md.

name: unslop
version: 0.3.0
description: >-
  Rewrite assistant output so it reads like a careful human wrote it.
  Strip sycophancy, stock vocab, hedging stacks, performative balance,
  em-dash pileups, and tricolon padding. Preserve code blocks, inline
  code, URLs, markdown links, headings, file paths, and technical terms
  exactly.

system_prompt_file: ../SKILL.md

inputs:
  - name: mode
    type: string
    enum: [subtle, balanced, full, voice-match, anti-detector, off]
    default: balanced
    description: Intensity level. See SKILL.md for behavior of each.

tools: []

defaults:
  temperature: 0.7
  # Higher temperature intentional — prose variety matters here. Factuality
  # comes from the preserved regions, not from the rewrite of prose.

safety:
  preservation_required:
    - fenced code blocks (``` ... ```)
    - inline code (`...`)
    - URLs
    - markdown links
    - headings (text and level)
    - file paths and shell commands
    - version numbers and error messages

tags:
  - writing
  - de-ai
  - humanize
  - prose
  - markdown
