name: Plugin Submission
description: Submit a new Codex plugin to be added to the list
title: "[Plugin] "
labels: plugin-submission
body:
  - type: input
    id: name
    attributes:
      label: Plugin Name
      description: The name of the Codex plugin
      placeholder: "e.g., My Awesome Plugin"
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: GitHub Repository URL
      description: Link to the plugin's public repository
      placeholder: "https://github.com/user/plugin-repo"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A concise description of what the plugin does (one sentence)
      placeholder: "Briefly describe the plugin's functionality..."
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author
      description: GitHub username or organization name
      placeholder: "username"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which section should this plugin be listed under?
      options:
        - Community Plugins
        - Plugin Development (tools/frameworks)
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: Please confirm the following
      options:
        - label: Plugin has a valid `.codex-plugin/plugin.json` manifest
          required: true
        - label: Plugin is functional and well-documented
          required: true
        - label: Repository is public
          required: true
